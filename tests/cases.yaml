      fixture_dir: tests/fixtures/function-gov-level/frozen-removal
      change_intent: tests/fixtures/evidence-integration/change-intent.yaml
    expect:
      verdict: blocked
      exit_code: 1
      files_changed: 1
      lines_added: 1
      lines_removed: 2
      changed_files:
        - path: app/service.py
          zone_level: free
          in_allowed_paths: true
      changed_functions:
        - path: app/service.py
          name: <module>
          before_line: null
          after_line: null
          source: map
        - path: app/service.py
          name: ledger_write
          before_line: null
          after_line: 7
          source: map
        - path: app/service.py
          name: ledger_write
          before_line: 7
          after_line: 7
          source: classify_added
        - path: app/service.py
          name: ledger_write
          before_line: 8
          after_line: 8
          source: classify_deleted
      reasons_contain:
        - function_frozen:app/service.py::ledger_write:base
      coverage_checked_gates:
        - check-change-intent
        - check-sensitive-zones
        - check-function-gov-level
      coverage_not_checked:
        - runtime execution paths
        - unregistered sensitive business logic
        - cross-commit cumulative risk
        - non-Python semantic analysis
        - complete dynamic obfuscation recovery
      verdict_statement: governance violation detected
      no_safe_text: true
      version_metadata_present: true
      schema_keys_match_template: true

