cases:
  - name: good
    gate: generate-change-evidence
    input:
      name_status: tests/fixtures/good/name-status.txt
      numstat: tests/fixtures/good/numstat.txt
      change_intent: tests/fixtures/good/change-intent.yaml
    expect:
      verdict: pass
      exit_code: 0
      files_changed: 1
      lines_added: 3
      lines_removed: 1
      changed_files:
        - path: app/features/search.py
          zone_level: free
          in_allowed_paths: true
      coverage_checked_gates:
        - check-change-intent
        - check-sensitive-zones
      coverage_not_checked:
        - runtime execution paths
        - unregistered sensitive business logic
        - cross-commit cumulative risk
        - non-Python semantic analysis
        - complete dynamic obfuscation recovery
      verdict_statement: no governance violation detected
      no_safe_text: true
      version_metadata_present: true
      schema_keys_match_template: true

  - name: evidence-function-frozen
    gate: generate-change-evidence
