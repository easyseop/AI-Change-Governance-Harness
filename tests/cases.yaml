cases:
  - name: good
    gate: generate-change-evidence
    input:
      name_status: tests/fixtures/good/name-status.txt
      numstat: tests/fixtures/good/numstat.txt
      change_intent: tests/fixtures/good/change-intent.yaml
    expect:
      verdict: pass
      exit_code: 0
      files_changed: 1
      lines_added: 3
      lines_removed: 1
      changed_files:
        - path: app/features/search.py
          zone_level: free
          in_allowed_paths: true

  - name: out-of-scope
    gate: check-change-intent
    input:
      name_status: tests/fixtures/out-of-scope/name-status.txt
      change_intent: tests/fixtures/out-of-scope/change-intent.yaml
    expect:
      verdict: approval_required
      exit_code: 2
      out_of_scope_paths:
        - docs/release-notes.md

  - name: forbidden
    gate: check-change-intent
    input:
      name_status: tests/fixtures/forbidden/name-status.txt
      change_intent: tests/fixtures/forbidden/change-intent.yaml
    expect:
      verdict: blocked
      exit_code: 1
      forbidden_touched:
        - secrets/prod.key

  - name: frozen
    gate: check-sensitive-zones
    input:
      name_status: tests/fixtures/frozen/name-status.txt
    expect:
      verdict: blocked
      exit_code: 1
      frozen_touched:
        - services/settlement/calculate.py

  - name: protected
    gate: check-sensitive-zones
    input:
      name_status: tests/fixtures/protected/name-status.txt
    expect:
      verdict: approval_required
      exit_code: 2
      protected_touched:
        - services/auth/login.py
      required_approval:
        - security-reviewer

  - name: watched
    gate: check-sensitive-zones
    input:
      name_status: tests/fixtures/watched/name-status.txt
    expect:
      verdict: pass
      exit_code: 0
      watched_touched:
        - lib/common/helpers.py

  - name: python-inventory
    gate: extract-python-inventory
    input:
      source_file: tests/fixtures/python-inventory/valid.py
    expect:
      exit_code: 0
      parse_error: null
      items:
        - type: function
          name: decorator
          start_line: 1
          end_line: 4
          decorators: []
        - type: function
          name: decorator.wrapper
          start_line: 2
          end_line: 3
          decorators: []
        - type: function
          name: outer
          start_line: 6
          end_line: 9
          decorators: []
        - type: function
          name: outer.inner
          start_line: 7
          end_line: 8
          decorators: []
        - type: class
          name: Service
          start_line: 11
          end_line: 18
          decorators: []
        - type: async_function
          name: Service.load
          start_line: 13
          end_line: 14
          decorators:
            - decorator
        - type: class
          name: Service.Nested
          start_line: 16
          end_line: 18
          decorators: []
        - type: function
          name: Service.Nested.method
          start_line: 17
          end_line: 18
          decorators: []
        - type: function
          name: decorated
          start_line: 21
          end_line: 22
          decorators:
            - decorator

  - name: python-inventory-parse-error
    gate: extract-python-inventory
    input:
      source_file: tests/fixtures/python-inventory/invalid.py
    expect:
      exit_code: 0
      parse_error_present: true
      items: []

  - name: function-mapping
    gate: map-diff-to-functions
    input:
      fixture_dir: tests/fixtures/function-mapping
    expect:
      exit_code: 0
      files:
        - path: app/non_utf8.py
          status: M
          touched_function_names:
            - <module>
          hunk_function_names:
            - [<module>]
        - path: app/sample.py
          status: M
          touched_function_names:
            - secure_view
            - outer
            - outer.inner
            - <module>
            - Service
            - Service.method
            - remove_me
          hunk_function_names:
            - [secure_view]
            - [outer, outer.inner]
            - [<module>]
            - [Service, Service.method]
            - [remove_me]
        - path: app/sibling.py
          status: M
          touched_function_names:
            - transfer
          hunk_function_names:
            - [transfer]

  - name: function-classification
    gate: classify-python-function-changes
    input:
      fixture_dir: tests/fixtures/function-classification
    expect:
      exit_code: 0
      files:
        - path: README.md
          status: M
          fallback: true
          fallback_reason: unsupported_language
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/changes.py
          status: M
          fallback: false
          fallback_reason: null
          parse_error_present: false
          function_changes:
            - name: Account
              type: class
              change_type: modified
              signature_changed: false
              body_changed: true
            - name: Account.balance
              type: function
              change_type: modified
              signature_changed: false
              body_changed: true
            - name: added
              type: function
              change_type: added
              signature_changed: false
              body_changed: false
            - name: body_only
              type: function
              change_type: modified
              signature_changed: false
              body_changed: true
            - name: outer
              type: function
              change_type: modified
              signature_changed: false
              body_changed: true
            - name: outer.inner
              type: function
              change_type: modified
              signature_changed: false
              body_changed: true
            - name: remove_me
              type: function
              change_type: deleted
              signature_changed: false
              body_changed: false
            - name: signature_change
              type: function
              change_type: modified
              signature_changed: true
              body_changed: true
        - path: app/companion.py
          status: M
          fallback: false
          fallback_reason: null
          parse_error_present: false
          function_changes:
            - name: companion
              type: function
              change_type: modified
              signature_changed: false
              body_changed: true
        - path: app/deleted_file.py
          status: D
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/new_file.py
          status: A
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/non_utf8.py
          status: M
          fallback: true
          fallback_reason: unreadable
          parse_error_present: true
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/parse_error.py
          status: M
          fallback: true
          fallback_reason: parse_error
          parse_error_present: true
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/pure_rename_source.py
          status: D
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/pure_rename_target.py
          status: A
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/renamed_source.py
          status: D
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false
        - path: app/renamed_target.py
          status: A
          fallback: true
          fallback_reason: file_added_or_deleted
          parse_error_present: false
          function_changes:
            - name: <file>
              type: file
              change_type: file_fallback
              signature_changed: false
              body_changed: false

  - name: gov-annotations
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/valid.py
    expect:
      exit_code: 0
      deterministic_md5: true
      annotations:
        - name: audit_async
          type: async_function
          order_key: 0
          level: watched
          effective_level: watched
          errors: []
          unresolved: false
          decorators: [gov]
        - name: LedgerWriter
          type: class
          order_key: 0
          level: frozen
          effective_level: frozen
          errors: []
          unresolved: false
          decorators: [gov]
        - name: LedgerWriter.commit
          type: function
          order_key: 0
          level: watched
          effective_level: frozen
          errors: []
          unresolved: false
          decorators: [gov]
        - name: LedgerWriter.inherited
          type: function
          order_key: 0
          level: null
          effective_level: frozen
          errors: []
          unresolved: false
          decorators: []
        - name: Account.balance
          type: function
          order_key: 1
          level: protected
          effective_level: protected
          errors: []
          unresolved: false
          decorators: [balance.setter, gov]
        - name: parse
          type: function
          order_key: 0
          level: watched
          effective_level: watched
          errors: []
          unresolved: false
          decorators: [overload, gov]
        - name: conditional
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: []
          unresolved: false
          decorators: [gov]
        - name: outer.inner
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: []
          unresolved: false
          decorators: [gov]
        - name: duplicate_gov
          type: function
          order_key: 0
          level: frozen
          effective_level: frozen
          errors: [duplicate]
          unresolved: false
          decorators: [gov, gov]
        - name: duplicate_field_gov
          type: function
          order_key: 0
          level: frozen
          effective_level: frozen
          errors: [duplicate]
          unresolved: false
          decorators: [gov]
        - name: invalid_level_case
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: [invalid_level]
          unresolved: false
          decorators: [gov]
        - name: unresolved_case
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: [unresolved]
          unresolved: true
          decorators: [gov]
        - name: missing_reason_case
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: [missing_reason]
          unresolved: false
          decorators: [gov]
        - name: unknown_field_case
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: [unknown_field]
          unresolved: false
          decorators: [gov]
        - name: positional_case
          type: function
          order_key: 0
          level: protected
          effective_level: protected
          errors: [invalid_syntax, missing_level]
          unresolved: true
          decorators: [gov]

  - name: gov-annotations-module
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/module.py
    expect:
      exit_code: 0
      module:
        level: protected
        reason: module constants
        line: 1
        errors: []
      annotations:
        - name: module_touched
          type: function
          order_key: 0
          level: null
          effective_level: protected
          errors: []
          unresolved: false
          decorators: []

  - name: gov-annotations-module-duplicate
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/module_duplicate.py
    expect:
      exit_code: 0
      module:
        level: frozen
        reason: duplicate level field
        line: 1
        errors: [invalid_module_gov]
      annotations:
        - name: module_duplicate_touched
          type: function
          order_key: 0
          level: null
          effective_level: frozen
          errors: []
          unresolved: false
          decorators: []

  - name: gov-annotations-module-annassign
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/module_annassign.py
    expect:
      exit_code: 0
      module:
        level: frozen
        reason: annotated module gov
        line: 1
        errors: []
      annotations:
        - name: module_annassign_touched
          type: function
          order_key: 0
          level: null
          effective_level: frozen
          errors: []
          unresolved: false
          decorators: []

  - name: gov-annotations-module-invalid-binding
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/module_invalid_binding.py
    expect:
      exit_code: 0
      module:
        level: protected
        reason: null
        line: 2
        errors: [invalid_module_gov]
      annotations:
        - name: module_invalid_binding_touched
          type: function
          order_key: 0
          level: null
          effective_level: protected
          errors: []
          unresolved: false
          decorators: []

  - name: gov-annotations-parse-error
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/gov-annotations/invalid.py
    expect:
      exit_code: 0
      parse_error_present: true
      annotation_count: 0

  - name: gov-annotations-unreadable
    gate: extract-gov-annotations
    input:
      source_file: tests/fixtures/function-classification/base/app/non_utf8.py
    expect:
      exit_code: 0
      unreadable_present: true
      annotation_count: 0
